<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Finance Tracker Dashboard</title>

<link rel="stylesheet" th:href="@{/css/styles.css}">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Finance Tracker</h2>

<a th:href="@{/}">Dashboard</a>
<a href="#">Add Expense</a>
<a href="#">Analytics</a>

</div>


<!-- MAIN CONTENT -->

<div class="main">

<h1>Dashboard</h1>


<!-- SUMMARY CARDS -->

<div class="summary-cards">

<div class="summary-card">
<h4>Total Transactions</h4>
<p th:text="${#lists.size(expenses)}">0</p>
</div>

<div class="summary-card">
<h4>Total Expenses</h4>
<p th:text="${#lists.size(expenses)}">0</p>
</div>

<div class="summary-card">
<h4>Status</h4>
<p>Tracking</p>
</div>

<div class="summary-card">
<h4>Finance Score</h4>
<p>92%</p>
</div>

</div>



<!-- CHART SECTION -->

<div class="dashboard-grid">

<div class="chart-card">

<h3>Expense Breakdown</h3>

<canvas id="expenseChart"></canvas>

</div>


<div class="chart-card">

<h3>Weekly Expenses</h3>

<canvas id="cashflowChart"></canvas>

</div>

</div>



<!-- ADD EXPENSE -->

<div class="form-container">

<h2>Add Expense</h2>

<form th:action="@{/add}" th:object="${expense}" method="post">

<input type="text" th:field="*{title}" placeholder="Expense Title">

<input type="number" step="0.01" th:field="*{amount}" placeholder="Amount">

<select th:field="*{category}">
<option value="Food">Food</option>
<option value="Travel">Travel</option>
<option value="Shopping">Shopping</option>
<option value="Bills">Bills</option>
</select>

<input type="date" th:field="*{date}">

<button type="submit">Add Expense</button>

</form>

</div>



<!-- TRANSACTIONS TABLE -->

<h2>Recent Transactions</h2>

<table>

<thead>

<tr>
<th>Title</th>
<th>Category</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="expense : ${expenses}">

<td th:text="${expense.title}"></td>
<td th:text="${expense.category}"></td>
<td th:text="${expense.amount}"></td>
<td th:text="${expense.date}"></td>

<td>
<a th:href="@{'/delete/' + ${expense.id}}">Delete</a>
</td>

</tr>

</tbody>

</table>

</div>


<!-- CHART SCRIPTS -->

<script>

const ctx = document.getElementById('expenseChart');

new Chart(ctx, {

type: 'doughnut',

data: {
labels: ['Food','Travel','Shopping','Bills'],
datasets: [{
data: [500,300,200,100],
backgroundColor:[
'#2fb673',
'#1f6f5c',
'#7ad3a5',
'#cfeee1'
]
}]
}

});



const ctx2 = document.getElementById('cashflowChart');

new Chart(ctx2, {

type: 'line',

data: {
labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
datasets:[{
label:'Expenses',
data:[200,300,150,400,350,200,500],
borderColor:'#2fb673',
tension:0.4
}]
}

});

</script>


</body>
</html>
